name: Scrape Places Locations

on:
  push:
    paths:
      - '_places/**'
      - 'talkmap.py'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'  # Specify the Python version you need

    - name: Install dependencies
      run: |
        pip install python-frontmatter geopy getorg --upgrade

    - name: Run talkmap script
      run: |
        python talkmap.py

    - name: Commit changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add talkmap/
        git commit -m "Automated update of places map" || echo "No changes to commit"
        git push